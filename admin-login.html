<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login |Kaizen japanese language Academy</title>
    <link rel="shortcut icon" href="IMG/icon1.jpg" type="image/x-icon">

    <link rel="shortcut icon" href="IMG/icon1.jpg" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark d-flex align-items-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card border-0 shadow-lg p-4">
                    <div class="text-center mb-4">
                        <h4 class="fw-bold">Admin Portal</h4>
                        <small class="text-muted">Enter credentials to manage students</small>
                    </div>
                    <form id="adminLoginForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="username" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">Login to Dashboard</button>
                    </form>
                    <div id="loginError" class="mt-3 text-danger text-center small d-none">
                        Invalid credentials. Try admin/admin123
                    </div>
                </div>
                <div class="text-center mt-3">
                    <a href="index.html" class="text-light-50 text-decoration-none small">← Back to Website</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
