<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | Kaizen japanese language Academy</title>
    <link rel="shortcut icon" href="IMG/icon1.jpg" type="image/x-icon">


    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;

    /* Japanese background image */
    background: 
        linear-gradient(
            rgba(0,0,0,0.45),
            rgba(0,0,0,0.45)
        ),
       url("IMG/form-background.jpeg");



    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

    /* Hero heading styles */
.hero-title {
    color: #ffffff;
    font-family: 'Noto Serif JP', serif;
    letter-spacing: 2px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.6);
}

.hero-subtitle {
    color: #fce7f3;
    font-family: 'Noto Serif JP', serif;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
}

/* Soft overlay only behind text */
.hero-overlay {
    display: inline-block;
    padding: 18px 30px;
    border-radius: 18px;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(4px);
}

        .brand-title {
            font-family: 'Noto Serif JP', serif;
            letter-spacing: 2px;
        }

       .japanese-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    animation: fadeUp 0.8s ease;
}

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px 15px;
        }

        .form-control:focus, .form-select:focus {
            border-color: #f43f5e;
            box-shadow: 0 0 0 0.15rem rgba(244,63,94,0.25);
        }

        .btn-sakura {
            background: linear-gradient(135deg, #f43f5e, #fb7185);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-sakura:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(244,63,94,0.4);
        }

        .japanese-text {
            font-family: 'Noto Serif JP', serif;
            color: #be123c;
        }

        .sakura-icon {
            font-size: 2.2rem;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <!-- Brand -->
<div class="text-center mb-5">
    <div class="hero-overlay">
        <div class="fs-3 mb-1">⛩️</div>

        <h1 class="fw-bold hero-title">
            KAIZEN Japanese Language Class
        </h1>

        <p class="hero-subtitle mt-2">
            日本語を楽しく学ぼう
        </p>
    </div>
</div>


            <!-- Card -->
            <div class="japanese-card p-4 p-md-5">
                <h3 class="fw-bold mb-2">Book Your Free Demo</h3>
                <p class="text-muted mb-4">
                    Fill in your details and our counselor will contact you within 24 hours.
                </p>

                <form id="registrationForm">
                    <div class="mb-3">
                        <label class="fw-semibold">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                    </div>

                    <div class="mb-3">
                        <label class="fw-semibold">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="fw-semibold">Phone Number</label>
                        <input type="tel" id="phone" class="form-control" placeholder="+91 XXXXX XXXXX" required>
                    </div>

                    <div class="mb-4">
                        <label class="fw-semibold">Course Interested In</label>
                        <select class="form-select" required id="course">
                            <option selected disabled>Select a course</option>
                            <option>Beginner Plan (JLPT N5)</option>
                            <option>JLPT Focus Batch (N4–N3)</option>
                            <option>1-on-1 Personal Coaching</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-sakura w-100 py-3">
                        ⛩️ Confirm Registration
                    </button>
                </form>

                <div id="successMessage" class="alert alert-success mt-4 d-none">
                    🎉 Registration Successful! We’ll contact you soon.
                </div>
            </div>

        </div>
    </div>
</div>
<script src="main.js"></script>
</body>
</html>
